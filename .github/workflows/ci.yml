name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri needs the system webview + GTK libs to compile on Linux.
      # (ffmpeg for media thumbnails gets added here in its phase.)
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # pnpm (not npm): the @sunday/contracts dependency uses pnpm's
      # `&path:` git-subdir syntax, which npm cannot resolve.
      - run: pnpm install --frozen-lockfile

      - name: Frontend lint / format / types
        run: |
          pnpm run lint
          pnpm run format:check
          pnpm run typecheck

      - name: Frontend unit tests
        run: pnpm run test

      - name: Rust fmt / clippy / tests
        working-directory: src-tauri
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

      - name: End-to-end (Playwright)
        run: |
          pnpm run build
          pnpm exec playwright install --with-deps chromium
          pnpm run test:e2e

  build:
    name: Build (${{ matrix.platform }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # Compiles the frontend + the Rust app on both first-class platforms.
      # Bundling/signing/notarization is wired up in Phase 13.2 (distribution).
      - name: Build Tauri app
        run: pnpm exec tauri build --no-bundle
