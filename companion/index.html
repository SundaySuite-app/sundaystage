<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0"
    />
    <meta name="theme-color" content="#0c1320" />
    <title>Følg med — SundayStage</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body
    data-scheme="dark"
    data-font="sans"
    data-size="l"
    data-spacing="default"
  >
    <!-- Connecting -->
    <div id="connecting" class="screen">
      <div class="church">Følg med</div>
      <div class="spinner" aria-hidden="true"></div>
      <p class="muted">Kobler til tjenesten…</p>
    </div>

    <!-- Live content -->
    <main id="viewer" class="screen hidden" aria-live="polite">
      <span id="demo-badge" class="badge">DEMO</span>
      <div id="section" class="section-label"></div>
      <div id="content" class="content"></div>
      <div id="reference" class="reference"></div>
      <div class="pip" id="pip" title="Tilkobling"></div>
    </main>

    <!-- Service ended -->
    <div id="ended" class="screen hidden">
      <h1>Tjenesten er ferdig</h1>
      <p class="muted">Takk for at du fulgte med.</p>
    </div>

    <!-- Settings drawer -->
    <button id="open-settings" class="settings-fab" aria-label="Innstillinger">
      ⚙
    </button>
    <div
      id="drawer"
      class="drawer hidden"
      role="dialog"
      aria-label="Innstillinger"
    >
      <div class="drawer-head">
        <h2>Tilpass visning</h2>
        <button id="close-settings" aria-label="Lukk">✕</button>
      </div>

      <fieldset>
        <legend>Tekststørrelse</legend>
        <div class="seg" data-control="size">
          <button data-val="m">M</button>
          <button data-val="l">L</button>
          <button data-val="xl">XL</button>
          <button data-val="xxl">XXL</button>
          <button data-val="huge">Enorm</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>Fargetema</legend>
        <div class="seg" data-control="scheme">
          <button data-val="light">Lyst</button>
          <button data-val="dark">Mørkt</button>
          <button data-val="contrast">Kontrast</button>
          <button data-val="sepia">Sepia</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>Skrift</legend>
        <div class="seg" data-control="font">
          <button data-val="sans">Standard</button>
          <button data-val="serif">Serif</button>
          <button data-val="readable">Lesevennlig</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>Linjeavstand</legend>
        <div class="seg" data-control="spacing">
          <button data-val="compact">Tett</button>
          <button data-val="default">Normal</button>
          <button data-val="airy">Luftig</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>Opplesning</legend>
        <label class="toggle"
          ><input type="checkbox" id="tts" /> Les hvert lysbilde høyt</label
        >
        <button id="reread" class="ghost">Les på nytt</button>
      </fieldset>

      <fieldset>
        <legend>Mer</legend>
        <label class="toggle"
          ><input type="checkbox" id="vibrate" /> Vibrer ved nytt
          lysbilde</label
        >
        <label class="toggle"
          ><input type="checkbox" id="reduce-motion" /> Reduser bevegelse</label
        >
      </fieldset>

      <button id="reset" class="ghost danger">Nullstill</button>
      <p class="powered">Powered by SundayStage</p>
    </div>

    <script src="app.js"></script>
  </body>
</html>
